<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | LabourMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --success-color: #2ecc71;
            --primary-color: #673ab7;
        }

        body {
            background-color: #f4f7fe;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: white;
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #e8faf0;
            color: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 {
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 10px;
        }

        p {
            color: #718096;
            margin-bottom: 30px;
        }

        .txn-details {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .txn-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .txn-row:last-child { margin-bottom: 0; }

        .btn-home {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: #512da8;
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h2>Payment Successful</h2>
        <p>Your transaction has been completed successfully. The worker has been notified.</p>

        <div class="txn-details">
            <div class="txn-row">
                <span class="text-secondary">Amount Paid</span>
                <span class="fw-bold">₹{{ "%.2f"|format(amount) }}</span>
            </div>
            <div class="txn-row">
                <span class="text-secondary">Booking ID</span>
                <span class="fw-bold">#{{ booking_id }}</span>
            </div>
            <div class="txn-row">
                <span class="text-secondary">Status</span>
                <span class="badge bg-success">Completed</span>
            </div>
        </div>

        <a href="{{ url_for('customer_bookings') }}" class="btn btn-home">
            Go to My Bookings
        </a>
    </div>

</body>
</html>
