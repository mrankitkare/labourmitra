<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | LabourMitra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%; border-radius: 12px; border: none;">
            <div class="text-center mb-4">
                <h3 class="fw-bold"><span style="color:#FFC107;">Labour</span><span class="text-primary">Mitra</span>
                </h3>
                <h5 class="text-muted mt-2">Password Recovery</h5>
                <p class="small text-secondary mb-0">Enter your registered mobile number to receive an OTP.</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="mb-3">
                    <input type="text" name="mobile" class="form-control form-control-lg text-center fw-bold"
                        placeholder="Mobile Number" required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Send Recovery OTP</button>
            </form>

            <div class="text-center small">
                <a href="{{ url_for('login') }}" class="text-decoration-none">← Back to Login</a>
            </div>

        </div>
    </div>

</body>

</html>
