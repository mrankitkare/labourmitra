<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | LabourMitra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%; border-radius: 12px; border: none;">
            <div class="text-center mb-4">
                <h3 class="fw-bold"><span style="color:#FFC107;">Labour</span><span class="text-primary">Mitra</span>
                </h3>
                <h5 class="text-muted mt-2">Verify Mobile Number</h5>
                <p class="small text-secondary mb-0">OTP has been sent to {{ mobile }}</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
            {% endif %}

            {% if demo_otp %}
            <div class="alert alert-info py-3 text-center mb-3">
                <span class="d-block text-dark fw-bold mb-1">Demo OTP: <span
                        class="fs-4 text-primary tracking-widest">{{ demo_otp }}</span></span>
                <span class="small text-muted d-block mt-2">Enter this OTP to continue.</span>
                <hr class="my-2 opacity-25">
                <span class="d-block" style="font-size: 0.75rem; color: #6c757d;">Demo Mode: OTP is shown on
                    screen.<br>In production, OTP will be sent via SMS gateway.</span>
            </div>
            {% endif %}

            <form method="POST"
                action="{{ url_for('verify_register_otp' if action == 'register' else 'verify_forgot_otp' if action == 'forgot' else 'verify_login_otp') }}">
                <div class="mb-3">
                    <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold"
                        placeholder="Enter 6-digit OTP" required maxlength="6" pattern="[0-9]{6}" autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Verify OTP</button>
            </form>

            <div class="text-center small">
                <a href="{{ url_for('login') }}" class="text-decoration-none">Cancel</a>
            </div>

        </div>
    </div>

</body>

</html>
