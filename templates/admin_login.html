<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LabourMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="login-box text-center">
        <h3 class="fw-bold mb-4 text-dark">System Admin</h3>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="email" name="email" class="form-control mb-3 py-2" placeholder="Admin Email" required>
            <input type="password" name="password" class="form-control mb-4 py-2" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login to Dashboard</button>
        </form>
        <div class="mt-4 small text-muted">
            <a href="{{ url_for('home') }}" class="text-decoration-none">← Back to Portal</a>
        </div>
    </div>

</body>

</html>
