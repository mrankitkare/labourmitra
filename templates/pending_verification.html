<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Verification | LabourMitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .pending-card { max-width: 500px; margin: 100px auto; text-align: center; border-radius: 15px; border-top: 5px solid #ffc107; }
        .icon { font-size: 60px; color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow pending-card p-5">
            <div class="icon mb-3"><i class="bi bi-hourglass-split"></i></div>
            <h2 class="fw-bold">Pending for Verification</h2>
            <p class="text-muted mt-3">Your documents are currently under review by the admin. You will gain access to your dashboard and start receiving bookings once your profile is approved.</p>
            <p class="text-muted">Please check back later.</p>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger mt-4">Logout</a>
        </div>
    </div>
</body>
</html>
